<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima en Temixco - Nuestra Boda</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #556B2F;
            --white: #ffffff;
            --font-head: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
        }

        .weather-fullscreen-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .btn-back {
            background: var(--white);
            color: var(--primary-color);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            border: 2px solid var(--primary-color);
        }

        .btn-back:hover {
            transform: translateY(-3px);
            background: var(--primary-color);
            color: var(--white);
        }

        .weather-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            text-align: center;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="index.html#clima" class="btn-back">
            <i class='bx bx-left-arrow-alt'></i> Regresar a la Invitación
        </a>
    </div>

    <div class="weather-fullscreen-container">
        <div class="weather-loader">
            <i class='bx bx-loader-alt bx-spin' style="font-size: 3rem;"></i>
            <p>Cargando pronóstico...</p>
        </div>
        <iframe 
            src="https://embed.windy.com/embed2.html?lat=18.852&lon=-99.224&zoom=11&level=surface&overlay=wind&menu=true&message=true&marker=true&calendar=now&pressure=true&type=map&location=coordinates&detail=true&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1" 
            title="Pronóstico Windy Temixco">
        </iframe>
    </div>

</body>
</html>
